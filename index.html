<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="styl.css">
</head>
<body style="background-image: url(pic/bglogpic.jpg);">

<div class="main">


  <div class="container" id="sinUp" style="display:none;">
    <form method="post" action="login.php">
      <h1 class="form-title">Sign Up</h1>
      <div class="input-group">
        <label for="name">Full Name</label>
        <div class="input-wrap">
          <i class="fas fa-user"></i>
          <input type="text" name="name" id="name" placeholder="Jane Smith" class="f1" required>
        </div>
      </div>
      <div class="input-group">
        <label for="signup-email">Email Address</label>
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" id="signup-email" name="email" placeholder="you@example.com" class="f1" required>
        </div>
      </div>
      <div class="input-group">
        <label for="signup-password">Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="signup-password" name="password" placeholder="Min. 8 characters" class="f1" required>
        </div>
      </div>
      <input type="submit" class="btn" value="Create Account" name="sinUp">
    </form>
    <div class="link">
      <p>Already have an account?</p>
      <button id="signInBtn" class="f1">Sign In</button>
    </div>
  </div>

  <div class="container1" id="sinIn">
    <form method="post" action="login.php">
      <h1 class="form-title">Sign In</h1>
      <div class="input-group">
        <label for="email">Email Address</label>
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" name="email" placeholder="you@example.com" class="f1" required>
        </div>
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" name="password" placeholder="••••••••" class="f1" required>
        </div>
      </div>
      <input type="submit" class="btn" value="Sign In" name="sinIn">
    </form>
    <div class="link">
      <p>Don't have an account?</p>
      <button id="signUpBtn" class="f1">Sign Up</button>
    </div>
  </div>

</div>

<script src="login.js"></script>
</body>
</html>
